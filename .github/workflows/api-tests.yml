name: API Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
  pull_request:
    paths:
      - 'packages/api/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bluecollar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: packages/api

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run migrations
        run: pnpm migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bluecollar_test

      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bluecollar_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bluecollar_test
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: packages/api/coverage/
          retention-days: 7
